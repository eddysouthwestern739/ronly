[package]
name = "ronly"
version = "0.1.0"
edition = "2021"

[dependencies]
lexopt = "0.3"
libc = "0.2"

[dev-dependencies]
nix = { version = "0.29", features = ["user"] }

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.29", features = [
  "mount",
  "sched",
  "signal",
  "process",
  "fs",
] }
seccompiler = "0.5"
